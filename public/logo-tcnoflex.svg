<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" fill="none">
  <defs>
    <clipPath id="leftRingClip">
      <path d="M 200 78 a 95 52 0 1 1 0 104 a 95 52 0 1 1 0 -104 M 200 102 a 68 28 0 1 0 0 56 a 68 28 0 1 0 0 -56 Z" fill-rule="evenodd"/>
    </clipPath>
    <clipPath id="rightRingClip">
      <path d="M 360 78 a 95 52 0 1 1 0 104 a 95 52 0 1 1 0 -104 M 360 102 a 68 28 0 1 0 0 56 a 68 28 0 1 0 0 -56 Z" fill-rule="evenodd"/>
    </clipPath>

    <!-- 3D ribbon shading -->
    <linearGradient id="ribbonShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="22%"  stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="50%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="78%"  stop-color="#000000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Stars pattern for canton -->
    <pattern id="starsPattern" x="0" y="0" width="11" height="10" patternUnits="userSpaceOnUse">
      <polygon points="5.5,1.3 6.6,4 9.5,4 7.2,5.8 8.1,8.5 5.5,7 2.9,8.5 3.8,5.8 1.5,4 4.4,4" fill="#FFFFFF"/>
    </pattern>

    <filter id="ribbonShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" in="SourceAlpha"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="itemShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" in="SourceAlpha"/>
      <feOffset dx="1" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Radial gradient for T/F badge backgrounds (cream/beige) -->
    <radialGradient id="badgeBg" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%"   stop-color="#FFF8E7"/>
      <stop offset="100%" stop-color="#E8D8B8"/>
    </radialGradient>
  </defs>

  <!-- ======== RIGHT LOOP: USA flag ======== -->
  <g filter="url(#ribbonShadow)">
    <g clip-path="url(#rightRingClip)">
      <rect x="265" y="78" width="190" height="104" fill="#FFFFFF"/>
      <rect x="265" y="78"  width="190" height="8" fill="#B22234"/>
      <rect x="265" y="94"  width="190" height="8" fill="#B22234"/>
      <rect x="265" y="110" width="190" height="8" fill="#B22234"/>
      <rect x="265" y="126" width="190" height="8" fill="#B22234"/>
      <rect x="265" y="142" width="190" height="8" fill="#B22234"/>
      <rect x="265" y="158" width="190" height="8" fill="#B22234"/>
      <rect x="265" y="174" width="190" height="8" fill="#B22234"/>
      <rect x="265" y="78" width="84" height="56" fill="#3C3B6E"/>
      <rect x="265" y="78" width="84" height="56" fill="url(#starsPattern)"/>
      <rect x="265" y="78" width="190" height="104" fill="url(#ribbonShade)"/>
    </g>
    <!-- Ring outlines with dashed stitching like reference -->
    <ellipse cx="360" cy="130" rx="95" ry="52" fill="none" stroke="#0F1E4D" stroke-width="2.5"/>
    <ellipse cx="360" cy="130" rx="68" ry="28" fill="none" stroke="#0F1E4D" stroke-width="2"/>
    <ellipse cx="360" cy="130" rx="95" ry="52" fill="none" stroke="#FFFFFF" stroke-width="1"
             stroke-dasharray="4,3" opacity="0.6"/>
    <ellipse cx="360" cy="130" rx="68" ry="28" fill="none" stroke="#FFFFFF" stroke-width="1"
             stroke-dasharray="3,3" opacity="0.5"/>
  </g>

  <!-- ======== LEFT LOOP: Colombia flag ======== -->
  <g filter="url(#ribbonShadow)">
    <g clip-path="url(#leftRingClip)">
      <rect x="105" y="78"  width="190" height="52" fill="#FCD116"/>
      <rect x="105" y="130" width="190" height="26" fill="#003893"/>
      <rect x="105" y="156" width="190" height="26" fill="#CE1126"/>
      <rect x="105" y="78" width="190" height="104" fill="url(#ribbonShade)"/>
    </g>
    <ellipse cx="200" cy="130" rx="95" ry="52" fill="none" stroke="#0F1E4D" stroke-width="2.5"/>
    <ellipse cx="200" cy="130" rx="68" ry="28" fill="none" stroke="#0F1E4D" stroke-width="2"/>
    <ellipse cx="200" cy="130" rx="95" ry="52" fill="none" stroke="#FFFFFF" stroke-width="1"
             stroke-dasharray="4,3" opacity="0.6"/>
    <ellipse cx="200" cy="130" rx="68" ry="28" fill="none" stroke="#FFFFFF" stroke-width="1"
             stroke-dasharray="3,3" opacity="0.5"/>
  </g>

  <!-- ==== AIRPLANE (big, white, across top) ==== -->
  <g transform="translate(310, 55) rotate(-6)" filter="url(#itemShadow)">
    <!-- Fuselage -->
    <ellipse cx="0" cy="0" rx="72" ry="10" fill="#FFFFFF"/>
    <path d="M 66 -5 Q 82 -2 84 0 Q 82 2 66 5 Z" fill="#E2E8F0"/>
    <!-- Main wings -->
    <path d="M 8 -8 L -20 -36 L -2 -36 L 22 -8 Z" fill="#F8FAFC" stroke="#94A3B8" stroke-width="0.8"/>
    <path d="M 8 8 L -20 36 L -2 36 L 22 8 Z" fill="#F8FAFC" stroke="#94A3B8" stroke-width="0.8"/>
    <!-- Tail wings -->
    <path d="M -52 -4 L -64 -17 L -54 -17 L -42 -4 Z" fill="#F8FAFC" stroke="#94A3B8" stroke-width="0.6"/>
    <path d="M -52 4 L -64 17 L -54 17 L -42 4 Z" fill="#F8FAFC" stroke="#94A3B8" stroke-width="0.6"/>
    <path d="M -58 -1 L -68 -18 L -58 -18 L -52 -1 Z" fill="#F8FAFC" stroke="#94A3B8" stroke-width="0.6"/>
    <!-- Red stripe along body -->
    <rect x="-45" y="-2.2" width="92" height="4.4" fill="#DC2626"/>
    <!-- Windows -->
    <g fill="#0F1E4D">
      <circle cx="44" cy="-3.5" r="1.5"/>
      <circle cx="38" cy="-3.5" r="1.5"/>
      <circle cx="32" cy="-3.5" r="1.5"/>
      <circle cx="26" cy="-3.5" r="1.5"/>
      <circle cx="20" cy="-3.5" r="1.5"/>
      <circle cx="14" cy="-3.5" r="1.5"/>
      <circle cx="8"  cy="-3.5" r="1.5"/>
      <circle cx="2"  cy="-3.5" r="1.5"/>
      <circle cx="-4" cy="-3.5" r="1.5"/>
      <circle cx="-10" cy="-3.5" r="1.5"/>
      <circle cx="-16" cy="-3.5" r="1.5"/>
    </g>
    <!-- Cockpit -->
    <path d="M 56 -6 Q 68 -2 68 0 Q 68 2 56 6 Z" fill="#0F1E4D"/>
    <!-- Engines -->
    <ellipse cx="0" cy="18" rx="8" ry="3.5" fill="#64748B"/>
    <ellipse cx="0" cy="-18" rx="8" ry="3.5" fill="#64748B"/>
  </g>

  <!-- ==== PACKAGE at center ==== -->
  <g transform="translate(258, 106)" filter="url(#itemShadow)">
    <rect x="0" y="0" width="44" height="48" rx="3" fill="#C4935E" stroke="#5C4028" stroke-width="2"/>
    <line x1="0" y1="16" x2="44" y2="16" stroke="#5C4028" stroke-width="1" opacity="0.6"/>
    <rect x="0" y="20" width="44" height="9" fill="#9B7448"/>
    <rect x="17.5" y="0" width="9" height="48" fill="#9B7448"/>
    <path d="M 3 3 L 12 3 L 12 7 L 6 7 Z" fill="#E8CCA0" opacity="0.7"/>
  </g>

  <!-- ==== T Badge (cream with red border, like reference) ==== -->
  <g transform="translate(200, 130)" filter="url(#itemShadow)">
    <circle r="30" fill="url(#badgeBg)" stroke="#CE1126" stroke-width="3"/>
    <text y="2" dominant-baseline="central" text-anchor="middle"
          font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#0F1E4D">T</text>
  </g>

  <!-- ==== F Badge (cream with red border) ==== -->
  <g transform="translate(360, 130)" filter="url(#itemShadow)">
    <circle r="30" fill="url(#badgeBg)" stroke="#CE1126" stroke-width="3"/>
    <text y="2" dominant-baseline="central" text-anchor="middle"
          font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#0F1E4D">F</text>
  </g>

  <!-- ==== ENVELOPE below right of F (near bottom of right loop) ==== -->
  <g transform="translate(395, 150)" filter="url(#itemShadow)">
    <rect x="0" y="0" width="32" height="22" rx="1.5" fill="#FFFFFF" stroke="#0F1E4D" stroke-width="1.5"/>
    <path d="M 0 0 L 16 11 L 32 0" fill="none" stroke="#0F1E4D" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="24" cy="17" r="2.5" fill="#DC2626"/>
  </g>

  <!-- ==== TCNOflex wordmark ==== -->
  <g text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif">
    <text x="280" y="248" font-size="56" letter-spacing="-1.5" fill="#FFFFFF">
      <tspan font-weight="900">TCNO</tspan><tspan font-weight="300" font-style="italic">flex</tspan>
    </text>
    <text x="280" y="282" font-size="13" letter-spacing="6" fill="#FFFFFF" font-weight="500" opacity="0.85">
      CONECTIVIDAD SIN LÍMITES
    </text>
  </g>
</svg>
